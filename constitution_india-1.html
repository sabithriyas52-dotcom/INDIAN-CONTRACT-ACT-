ature of the Sta","h":"Procedure Generally"},{"n":209,"t":"The Legislature of a State may, for the purpose of the timely completion of financial business, regulate by law the procedure of, and the conduct of business in, the House or Houses of the Legislature of the State in relation to any financial matter or to any Bill for the appropriation of moneys out of the Consolidated Fund of the State, and, if and so far as any provision of any law so made is inconsistent with any rule made by the House or either House of the Legislature of the State under cla","h":""},{"n":210,"t":"(1) Notwithstanding anything in Part XVII, but subject to the provisions of article 348, business in the Legislature of a State shall be transacted in the official language or languages of the State or in Hindi or in English: Provided that the Speaker of the Legislative Assembly or Chairman of the Legislative Council, or person acting as such, as the case may be, may permit any member who cannot adequately express himself in any of the languages aforesaid to address the House in his mothertongue","h":""},{"n":211,"t":"No discussion shall take place in the Legislature of a State with respect to the conduct of any Judge of the Supreme Court or of a High Court in the discharge of his duties. Restriction on discussion in the Legislature.","h":""},{"n":212,"t":"(1) The validity of any proceedings in the Legislature of a State shall not be called in question on the ground of any alleged irregularity of procedure. Courts not to inquire into proceedings of the Legislature. (2) No officer or member of the Legislature of a State in whom powers are vested by or under this Constitution for regulating procedure or the conduct of business, or for maintaining order, in the Legislature shall be subject to the jurisdiction of any court in respect of the exercise b","h":"Legislature of a State shall not be called in question on"},{"n":213,"t":"(1) If at any time, except when the Legislative Assembly of a State is in session, or where there is a Legislative Council in a State, except when both Houses Power of Governor to promulgate Ordinances during recess of Legislature. Ins. by the State of Himachal Pradesh Act, 1970 (53 of 1970), s. 46 (w.e.f. 25-1-1971). Subs. by the North-Eastern Areas (Reorganisation) Act, 1971 (81 of 1971), s. 71, for “Legislature of the State of Himachal Pradesh” (w.e.f. 21-1-1972). Ins. by the State of Mizoram","h":"Assembly of a State is in session, or where there is a"},{"n":214,"t":"2*** There shall be a High Court for each State. * * * * High Courts for States. *","h":""},{"n":215,"t":"Every High Court shall be a court of record and shall have all the powers of such a court including the power to punish for contempt of itself. High Courts to be courts of record.","h":""},{"n":216,"t":"Every High Court shall consist of a Chief Justice and such other Judges as the President may from time to time deem it necessary to appoint. Constitution of High Courts. * * * * * Cl. (4) was ins. by the Constitution (Thirty-eighth Amendment) Act, 1975, s. 3 (retrospectively) and omitted by the Constitution (Forty-fourth Amendment) Act, 1978, s. 27 (w.e.f. 20-6-1979). The brackets and figure “(1)” omitted by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. Cls. (2) and (3) omitted ","h":""},{"n":217,"t":"(1) Every Judge of a High Court shall be appointed by the President by warrant under his hand and seal after consultation with the Chief Justice of India, the Governor of the State, and, in the case of appointment of a Judge other than the Chief Justice, the Chief Justice of the High Court, and 1[shall hold office, in the case of an additional or acting Judge, as provided in article 224, and in any other case, until he attains the age of 2[sixtytwo years]]: Provided that— (a) a Judge may, by wri","h":""},{"n":218,"t":"The provisions of clauses (4) and (5) of article in relation to the Supreme Court with the substitution of references to the High Cour tution (Seventh Amendment) Act, 1956, s. 1","h":""},{"n":223,"t":"When the office of Chief Justice of a High Court is vacant or when any such Chief Justice is, by reason of absence or otherwise, unable to perform the duties of his office, the duties of the office shall be performed by such one of the other Judges of the Court as the President may appoint for the purpose. [224. (1) If by reason of any temporary increase in the business of a High Court or by reason of arrears of work therein, it appears to the President that the number of the Judges of that Cour","h":"President may by order fix.]"},{"n":225,"t":"Subject to the provisions of this Constitution and to the provisions of any law of the appropriate Legislature made by virtue of powers conferred on that Legislature by this Constitution, the jurisdiction of, and the law administered in, any existing High Court, and the respective powers of the Judges thereof in relation to the administration of justice in the Court, including any power to make rules of Court and to regulate the sittings of the Court and of members thereof sitting alone or in Di","h":""},{"n":227,"t":"3 [(1) Every High Court shall have superintendence over all courts and tribunals throughout the territories in relation to which it exercises jurisdiction.] (2) Without prejudice to the generality of the foregoing provision, the High Court may— (a) call for returns from such courts; (b) make and issue general rules and prescribe forms for regulating the practice and proceedings of such courts; and (c) prescribe forms in which books, entries and accounts shall be kept by the officers of any such ","h":""},{"n":228,"t":"If the High Court is satisfied that a case pending in a court subordinate to it involves a substantial question of law as to the interpretation of this Constitution the determination of which is necessary for the disposal of the case, 2[it shall withdraw the case and 3*** may—] Transfer of certain cases to High Court. (a) either dispose of the case itself, or (b) determine the said question of law and return the case to the court from which the case has been so withdrawn together with a copy of ","h":""},{"n":229,"t":"(1) Appointments of officers and servants of a High Court shall be made by the Chief Justice of the Court or such other Judge or officer of the Court as he may direct: Officers and servants and the expenses of High Courts. Provided that the Governor of the State 5*** may by rule require that in such cases as may be specified in the rule no person not already attached to the Court shall be appointed to any office connected with the Court save after consultation with the State Public Service Commi","h":"High Court shall be made by the Chief Justice of the"},{"n":231,"t":"(1) Notwithstanding anything contained in the preceding provisions of this Chapter, Parliament may by law establish a common High Court for two or more States or for two or more States and a Union territory. (2) In relation to any such High Court,— (a) the reference in article 217 to the Governor of the State shall be construed as a reference to the Governors of all the States in relation to which the High Court exercises jurisdiction; The words “in which the High Court has its principal seat” o","h":""},{"n":233,"t":"(1) Appointments of persons to be, and the posting and promotion of, district judges in any State shall be made by the Governor of the State in consultation with the High Court exercising jurisdiction in relation to such State. Appointment of district judges. (2) A person not already in the service of the Union or of the State shall only be eligible to be appointed a district judge if he has been for not less than seven years an advocate or a pleader and is recommended by the High Court for appo","h":""},{"n":234,"t":"Appointments of persons other than district judges to the judicial service of a State shall be made by the Governor of the State in accordance with rules made by him in that behalf after hadweep;] [(c) Dadra and Nagar Haveli;] [(d) Daman and Diu;] [(e) Puducherry;] *** ***: [Provided that when any body is created under article 239A to function as a Legislature for the 9[Union territory Cl. (4) was ins. by the Constitution (Thirty-eighth Amendment) Act, 1975, s. 4 (retrospectively) and omitted by the Consititution (Forty-fourt","h":""},{"n":241,"t":"(1) Parliament may by law constitute a High Court for a 4[Union territory] or declare any court in any [such territory] to be a High Court for all or any of the purposes of this Constitution. High Courts for Union territories. (2) The provisions of Chapter V of Part VI shall apply in relation to every High Court referred to in clause (1) as they apply in relation to a High Court referred to in article 214 subject to such modifications or exceptions as Parliament may by law provide. [(3) Subject ","h":"Court for a 4[Union territory] or declare any court in any"},{"n":242,"t":"[Coorg.] Rep. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. [PART IX","h":"Amendment) Act, 1956, s. 29 and Sch."}]},{"part":"PART IX","title":"THE PANCHAYATS","sa":243,"ea":243,"articles":[{"n":243,"t":"In this Part, unless the context otherwise requires,— Definitions. (a) “district” means a district in a State; (b) “Gram Sabha” means a body consisting of persons registered in the electoral rolls relating to a village comprised within the area of Panchayat at the village level; (c) “intermediate level” means a level between the village and district levels specified by the Governor of a State by public notification to be the intermediate level for the purposes of this Part; (d) “Panchayat” means","h":""}]},{"part":"PART IX-A","title":"THE MUNICIPALITIES","sa":null,"ea":null,"articles":[]},{"part":"PART X","title":"THE SCHEDULED AND TRIBAL AREAS","sa":244,"ea":244,"articles":[{"n":244,"t":"(1) The provisions of the Fifth Schedule shall apply to the administration and control of the Scheduled Areas and Scheduled Tribes in any State 1*** other than [the States of Assam 3[, 4[Meghalaya, Tripura and Mizoram]]]. (2) The provisions of the Sixth Schedule shall apply to the administration of the tribal areas in 2[the States of Assam 3[, 5[Meghalaya, Tripura and Mizoram]]]. Formation of an autonomous State comprising certain tribal areas in Assam and creation of local Legislature or Counci","h":""}]},{"part":"PART XI","title":"RELATIONS BETWEEN THE UNION AND THE STATES","sa":245,"ea":263,"articles":[{"n":245,"t":"(1) Subject to the provisions of this Constitution, Parliament may make laws for the whole or any part of the territory of India, and the Legislature of a State may make laws for the whole or any part of the State. Subject-matter of laws made by Parliament and by the Legislatures of States.","h":"Parliament may make laws for the whole or any part of"},{"n":246,"t":"(1) Notwithstanding anything in clauses (2) and (3), Parliament has exclusive power to make laws with respect to any of the matters enumerated in List I in the Seventh Schedule (in this Constitution referred to as the “Union List”). (2) No law made by Parliament shall be deemed to be invalid on the ground that it would have extra-territorial operation. (2) Notwithstanding anything in clause (3), Parliament, and, subject to clause (1), the Legislature of any State 1*** also, have power to make la","h":""},{"n":247,"t":"Notwithstanding anything in this Chapter, Parliament may by law provide for the establishment of any additional courts for the better administration of laws made by Parliament or of any existing laws with respect to a matter enumerated in the Union List. Power of Parliament to provide for the establishment of certain additional courts.","h":"Parliament may by law provide for the establishment of"},{"n":248,"t":"(1) Parliament has exclusive power to make any law with respect to any matter not enumerated in the Concurrent List or State List. Residuary powers of legislation. (2) Such power shall include the power of making any law imposing a tax not mentioned in either of those Lists.","h":""},{"n":249,"t":"(1) Notwithstanding anything in the foregoing provisions of this Chapter, if the Council of States has declared by resolution supported by not less than twothirds of the members present and voting that it is necessary or expedient in the national interest that Parliament should make laws with respect to any matter enumerated in the State List specified in the resolution, it shall be lawful for Parliament to make laws for the whole or any part of the territory of India with respect to that matter","h":"Lists."},{"n":250,"t":"(1) Notwithstanding anything in this Chapter, Parliament shall, while a Proclamation of Emergency is in operation, have power to make laws for the whole or any part of the territory of India with respect to any of the matters enumerated in the State List. Inconsistency between laws made by Parliament under articles 249 and made by the Legislatures of States.","h":"Parliament shall, while a Proclamation of Emergency is"},{"n":251,"t":"Nothing in articles 249 and 250 shall restrict the power of the Legislature of a State to make any law which under this Constitution it has power to make, but if any provision of a law made by the Legislature of a State is repugnant to any provision of a law made by Parliament which Parliament has under either of the said articles power to make, the law made by Parliament, whether passed before or after the law made by the Legislature of the State, shall prevail, and the law made by the Legislat","h":""},{"n":252,"t":"(1) If it appears to the Legislatures of two or more States to be desirable that any of the matters with respect to which Parliament has no power to make laws for the States except as provided in articles 249 and 250 should be regulated in such States by Parliament by law, and if resolutions to that effect are passed by all the Houses of the Legislatures of those States, it shall be lawful for Parliament to pass an Act for regulating that matter accordingly, and any Act so passed shall apply to ","h":"States to be desirable that any of the matters with respect"},{"n":253,"t":"Notwithstanding anything in the foregoing provisions of this Chapter, Parliament has power to make any law for the whole or any part of the territory of India for implementing any treaty, agreement or convention with any other country or countries or any decision made at any international conference, association or other body. Legislation for giving effect to international agreements.","h":"Legislature of that State."},{"n":254,"t":"(1) If any provision of a law made by the Legislature of a State is repugnant to any provision of a law made by Parliament which Parliament is competent to enact, or to any provision of an existing law with respect to one of the matters enumerated in the Concurrent List, then, subject to the provisions of clause (2), the law made by Parliament, whether passed before or after the law made by the Legislature of such State, or, as the case may be, the existing law, shall prevail and the law made by","h":"Legislature of a State is repugnant to any provision of a"},{"n":255,"t":"No Act of Parliament or of the Legislature of a State 1***, and no provision in any such Act, shall be invalid by reason only that some recommendation or previous sanction required by this Constitution was not given, if assent to that Act was given— (a) where the recommendation required was that of the Governor, either by the Governor or by the President; (b) where the recommendation required was that of the Rajpramukh, either by the Rajpramukh or by the President; (c) where the recommendation o","h":"State 1***, and no provision in any such Act, shall be"},{"n":256,"t":"The executive power of every State shall be so exercised as to ensure compliance with the laws made by Parliament and any existing laws which apply in that State, and the executive power of the Union shall extend to the giving of such directions to a State as may appear to the Government of India to be necessary for that purpose. Control of the Union over States in certain cases.","h":""},{"n":257,"t":"(1) The executive power of every State shall be so exercised as not to impede or prejudice the exercise of the executive power of the Union, and the executive power of the Union shall extend to the giving of such directions to a State as may appear to the Government of India to be necessary for that purpose. (2) The executive power of the Union shall also extend to the giving of directions to a State as to the construction and maintenance of means of communication The words and letters “specifie","h":""},{"n":258,"t":"(1) Notwithstanding anything in this Constitution, the President may, with the consent of the Government of a State, entrust either conditionally or unconditionally to that Government or to its officers functions in relation to any matter to which the executive power of the Union extends. Power of the Union to confer powers, etc., on States in certain cases. Ins. by the Constitution (Forty-second Amendment) Act, 1976, s. 43 (w.e.f. 3-1-1977). (Part XI.—Relations between the Union and the States.","h":"Constitution, the President may, with the consent of the"},{"n":259,"t":"[Armed Forces in States in Part B of the First Schedule.] Rep. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. Jurisdiction of the Union in relation to territories outside India.","h":"Schedule.] Rep. by the Constitution (Seventh Amendment)"},{"n":260,"t":"The Government of India may by agreement with the Government of any territory not being part of the territory of India undertake any executive, legislative or judicial functions vested in the Government of such territory, but every such agreement shall be subject to, and governed by, any law relating to the exercise of foreign jurisdiction for the time being in force. Public acts, records and judicial proceedings.","h":""},{"n":261,"t":  such sale or purchase t","h":""},{"n":271,"t":"Notwithstanding anything in articles 269 and 270, Parliament may at any time increase any of the duties or taxes referred to in those articles by a surcharge for purposes of the Union and the whole proceeds of any such surcharge shall form part of the Consolidated Fund of India.","h":""},{"n":272,"t":"[Taxes which are levied and collected by the Union and may be distributed between the Union and the States.] Rep. by the Constitution (Eightieth Amendment) Act, 2000, s. 4. Grants in lieu of export duty on jute and jute products.","h":""},{"n":273,"t":"(1) There shall be charged on the Consolidated Fund of India in each year as grants-in-aid of the revenues of the States of Assam, Bihar, Orissa and West Bengal, in lieu of assignment of any share of the net proceeds in each year of export duty on jute and jute products to those States, such sums as may be prescribed. (2) The sums so prescribed shall continue to be charged on the Consolidated Fund of India so long as any export duty on jute or jute products continues to be levied by the Governme","h":"Fund of India in each year as grants-in-aid of the revenues"},{"n":274,"t":"(1) No Bill or amendment which imposes or varies any tax or duty in which States are interested, or which varies the meaning of the expression “agricultural income” as defined for the purposes of the enactments relating to Indian income-tax, or which affects the principles on which under any of the foregoing provisions of this Chapter moneys are or may be distributable to States, or which imposes any such surcharge for the purposes of the Union as is mentioned in the foregoing provisions of this","h":""},{"n":275,"t":"(1) Such sums as Parliament may by law provide shall be charged on the Consolidated Fund of India in each year as grants-in-aid of the revenues of such States as Parliament may determine to be in need of assistance, and different sums may be fixed for different States: Grants from the Union to certain States. Provided that there shall be paid out of the Consolidated Fund of India as grants-in-aid of the revenues of a State such capital and recurring sums as may be necessary to enable that State ","h":""},{"n":276,"t":"(1) Notwithstanding anything in article 246, no law of the Legislature of a State relating to taxes for the benefit of the State or of a municipality, district board, local board or other local authority therein in respect of professions, trades, callings or employments shall be invalid on the ground that it relates to a tax on income. Taxes on professions, trades, callings and employments. (2) The total amount payable in respect of any one person to the State or to any one municipality, distric","h":"Arts. 276—278.)"},{"n":277,"t":"Any taxes, duties, cesses or fees which, immediately before the commencement of this Constitution, were being lawfully levied by the Government of any State or by any municipality or other local authority or body for the purposes of the State, municipality, district or other local area may, notwithstanding that those taxes, duties, cesses or fees are mentioned in the Union List, continue to be levied and to be applied to the same purposes until provision to the contrary is made by Parliament by ","h":""},{"n":278,"t":"[Agreement with States in Part B of the First Schedule with regard to certain financial matters.] Rep. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. Subs. by the Constitution (Sixtieth Amendment) Act, 1988, s. 2, for “two hundred and fifty rupees”. Proviso omitted by s. 2, ibid. (Part XII.—Finance, Property, Contracts and Suits.— Arts. 279-280.) Calculation of “net proceeds”, etc.","h":""},{"n":279,"t":"(1) In the foregoing provisions of this Chapter, “net proceeds” means in relation to any tax or duty the proceeds thereof reduced by the cost of collection, and for the purposes of those provisions the net proceeds of any tax or duty, or of any part of any tax or duty, in or attributable to any area shall be ascertained and certified by the Comptroller and Auditor-General of India, whose certificate shall be final. (2) Subject as aforesaid, and to any other express provision of this Chapter, a l","h":""},{"n":280,"t":"(1) The President shall, within two years from the commencement of this Constitution and thereafter at the expiration of every fifth year or at such earlier time as the President considers necessary, by order constitute a Finance Commission which shall consist of a Chairman and four other members to be appointed by the President. (2) Parliament may by law determine the qualifications which shall be requisite for appointment as members of the Commission and the manner in which they shall be selec","h":""},{"n":281,"t":"The President shall cause every recommendation made by the Finance Commission under the provisions of this Constitution together with an explanatory memorandum as to the action taken thereon to be laid before each House of Parliament. Recommendations of the Finance Commission. Miscellaneous Financial Provisions","h":""},{"n":282,"t":"The Union or a State may make any grants for any public purpose, notwithstanding that the purpose is not one with respect to which Parliament or the Legislature of the State, as the case may be, may make laws. Expenditure defrayable by the Union or a State out of its revenues.","h":"Miscellaneous Financial Provisions"},{"n":283,"t":"(1) The custody of the Consolidated Fund of India and the Contingency Fund of India, the payment of moneys into such Funds, the withdrawal of moneys therefrom, the custody of public moneys other than those credited to such Funds received by or on behalf of the Government of India, their payment into the public account of India and the withdrawal of moneys from such account and all other matters connected with or Custody, etc., of Consolidated Funds, Contingency Funds and moneys credited to the p","h":"India and the Contingency Fund of India, the payment"},{"n":284,"t":"All moneys received by or deposited with— (a) any officer employed in connection with the affairs of the Union or of a State in his capacity as such, other than revenues or public moneys raised or received by the Government of India or the Government of the State, as the case may be, or (b) any court within the territory of India to the credit of any cause, matter, account or persons, shall be paid into the public account of India or the public account of State, as the case may be. Exemption of ","h":""},{"n":285,"t":"(1) The property of the Union shall, save in so far as Parliament may by law otherwise provide, be exempt from all taxes imposed by a State or by any authority within a State. (2) Nothing in clause (1) shall, until Parliament by law otherwise provides, prevent any authority within a State from levying any tax on any property of the Union to which such property was immediately before the commencement of this Constitution liable or treated as liable, so long as that tax continues to be levied in t","h":""},{"n":286,"t":"(1) No law of a State shall impose, or authorise the imposition of, a tax on the sale or purchase of goods where such sale or purchase takes place— Restrictions as to imposition of tax on the sale or purchase of goods. (a) outside the State; or (b) in the course of the import of the goods into, or export of the goods out of, the territory of India. * * * * [(2) Parliament may by law formulate principles for determining when a sale or purchase of goods takes place in any of the ways mentioned in ","h":"Arts. 286-287.)"},{"n":287,"t":"Save in so far as Parliament may by law otherwise provide, no law of a State shall impose, or authorise the imposition of, a tax on the consumption or sale of electricity (whether produced by a Government or other persons) which is— Exemption from taxes on electricity. (a) consumed by the Government of India, or sold to the Government of India for consumption by that Government; or (b) consumed in the construction, maintenance or operation of any railway by the Government of India or a railway c","h":"Parliament may by law specify.]]"},{"n":288,"t":"(1) Save in so far as the President may by order otherwise provide, no law of a State in force immediately before the commencement of this Constitution shall impose, or authorise the imposition of, a tax in respect of any water or electricity stored, generated, consumed, distributed or sold by any authority established by any existing law or any law made by Parliament for regulating or developing any inter-State river or river-valley. Explanation.—The expression “law of a State in force” in this","h":""},{"n":289,"t":"(1) The property and income of a State shall be exempt from Union taxation. (2) Nothing in clause (1) shall prevent the Union from imposing, or authorising the imposition of, any tax to such extent, if any, as Parliament may by law provide (Part XII.—Finance, Property, Contracts and Suits.— Arts. 289—290A.) in respect of a trade or business of any kind carried on by, or on behalf of, the Government of a State, or any operations connected therewith, or any property used or occupied for the purpos","h":""},{"n":290,"t":"Where under the provisions of this Constitution the expenses of any court or Commission, or the pension payable to or in respect of a person who has served before the commencement of this Constitution under the Crown in India or after such commencement in connection with the affairs of the Union or of a State, are charged on the Consolidated Fund of India or the Consolidated Fund of a State, then, if— Adjustment in respect of certain expenses and pensions. (a) in the case of a charge on the Cons","h":""},{"n":291,"t":"[Privy purse sums of Rulers.] Rep. by the Constitution (Twenty-sixth Amendment) Act, 197l, s. 2. CHAPTER II.—BORROWING Borrowing by the Government of India.","h":""},{"n":292,"t":"The executive power of the Union extends to borrowing upon the security of the Consolidated Fund of India within such limits, if any, as may from time to time be fixed by Parliament by law and to the giving of guarantees within such limits, if any, as may be so fixed. Borrowing by States.","h":""},{"n":293,"t":"(1) Subject to the provisions of this article, the executive power of a State extends to borrowing within the territory of India upon the security of the Consolidated Fund of the State within such limits, if any, as may from time to time be fixed by the Legislature of such State by law and to the giving of guarantees within such limits, if any, as may be so fixed. (2) The Government of India may, subject to such conditions as may be laid down by or under any law made by Parliament, make loans to","h":""},{"n":294,"t":"As from the commencement of this Constitution— (a) all property and assets which immediately before such commencement were vested in His Majesty for the purposes of the Government of the Dominion of India and all property and assets which immediately before such commencement were vested in His Majesty for the purposes of the Government of each Governor’s Province shall vest respectively in the Union and the corresponding State, and Succession to property, assets, rights, liabilities and obligati","h":"Constitution—"},{"n":295,"t":"(1) As from the commencement of this Constitution— (a) all property and assets which immediately before such commencement were vested in any Indian State corresponding to a State specified in Part B of the First Schedule shall vest in the Union, if the purposes for which such property and assets were held immediately before such commencement will thereafter be purposes of the Union relating to any of the matters enumerated in the Union List, and Succession to property, assets, rights, liabilitie","h":"Constitution—"},{"n":296,"t":"Subject as hereinafter provided, any property in the territory of India which, if this Constitution had not come into operation, would have accrued to His Majesty or, as the case may be, to the Ruler of an Indian State by escheat or lapse, or as bona vacantia for want of a rightful owner, shall, if it is property situate in a State, vest in such State, and shall, in any other case, vest in the Union: Provided that any property which at the date when it would have so accrued to His Majesty or to ","h":""},{"n":299,"t":"(1) All contracts made in the exercise of the executive power of the Union or of a State shall be expressed to be made by the President, or by the Governor 3*** of the State, as the case may be, and all such contracts and all assurances of property made in the exercise of that power shall be executed on behalf of Contracts. Subs. by the Constitution (Fortieth Amendment) Act, 1976, s. 2, for art. 297 (w.e.f. 27-5-1976). Subs. by the Constitution (Seventh Amendment) Act, 1956, s. 20, for art. 298.","h":"Parliament.]"},{"n":300,"t":"(1) The Government of India may sue or be sued by the name of the Union of India and the Government of a State may sue or be sued by the name of the State and may, subject to any provisions which may be made by Act of Parliament or of the Legislature of such State enacted by virtue of powers conferred by this Constitution, sue or be sued in relation to their respective affairs in the like cases as the Dominion of India and the corresponding Provinces or the corresponding Indian States might have","h":""}]},{"part":"PART XIII","title":"TRADE, COMMERCE AND INTERCOURSE","sa":301,"ea":307,"articles":[{"n":301,"t":"Subject to the other provisions of this Part, trade, commerce and intercourse throughout the territory of India shall be free. Freedom of trade, commerce and intercourse.","h":""},{"n":302,"t":"Parliament may by law impose such restrictions on the freedom of trade, commerce or intercourse between one State and another or within any part of the territory of India as may be required in the public interest. Power of Parliament to impose restrictions on trade, commerce and intercourse.","h":""},{"n":303,"t":"(1) Notwithstanding anything in article 302, neither Parliament nor the Legislature of a State shall have power to make any law giving, or authorising the giving of, any preference to one State over another, or making, or authorising the making of, any discrimination between one State and another, by virtue of any entry relating to trade and commerce in any of the Lists in the Seventh Schedule. Restrictions on the legislative powers of the Union and of the States with regard to trade and commerc","h":""},{"n":304,"t":"Notwithstanding anything in article 301 or article 303, the Legislature of a State may by law— (a) impose on goods imported from other States [or the Union territories] any tax to which similar goods manufactured or produced in that State are subject, so, however, as not to discriminate between goods so imported and goods so manufactured or produced; and Restrictions on trade, commerce and intercourse among States. Ins. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. (Part XIII","h":""},{"n":306,"t":"[Power of certain States in Part B of the First Schedule to impose restrictions on trade and commerce.] Rep. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. Appointment of authority for carrying out the purposes of articles","h":""},{"n":307,"t":"Parliament may by law appoint such authority as it considers appropriate for carrying out the purposes of articles 301, 302, 303 and 304, and confer on the authority so appointed such powers and such duties as it thinks necessary. Subs. by the Constitution (Fourth Amendment) Act, 1955, s. 4, for art. 305.","h":""}]},{"part":"PART XIV","title":"SERVICES UNDER THE UNION AND THE STATES","sa":308,"ea":323,"articles":[{"n":308,"t":"In this Part, unless the context otherwise requires, the expression “State” 1[does not include the State of Jammu and Kashmir]. Interpretation.","h":""},{"n":309,"t":"Subject to the provisions of this Constitution, Acts of the appropriate Legislature may regulate the recruitment, and conditions of service of persons appointed, to public services and posts in connection with the affairs of the Union or of any State: Recruitment and conditions of service of persons serving the Union or a State. Provided that it shall be competent for the President or such person as he may direct in the case of services and posts in connection with the affairs of the Union, and ","h":"Acts of the appropriate Legislature may regulate the"},{"n":310,"t":"(1) Except as expressly provided by this Constitution, every person who is a member of a defence service or of a civil service of the Union or of an all-India service or holds any post connected with defence or any civil post under the Union holds office during the pleasure of the President, and every person who is a member of a civil service of a State or holds any civil post under a State holds office during the pleasure of the Governor 3*** of the State. Tenure of office of persons serving th","h":"Constitution, every person who is a member of a defence"},{"n":311,"t":"(1) No person who is a member of a civil service of the Union or an all-India service or a civil service of a State or holds a civil post under the Union or a State shall be dismissed or removed by an authority subordinate to that by which he was appointed. [(2) No such person as aforesaid shall be dismissed or removed or reduced in rank except after an inquiry in which he has been informed of the charges against him and given a reasonable opportunity of being heard in respect of those charges 4","h":""},{"n":312,"t":"(1) Notwithstanding anything in 1[Chapter VI of Part VI or Part XI], if the Council of States has declared by resolution supported by not less than two-thirds of the members present and voting that it is necessary or expedient in the national interest so to do, Parliament may by law provide for the creation of one or more all India services 2[(including an all-India judicial service)] common to the Union and the States, and, subject to the other provisions of this Chapter, regulate the recruitme","h":"Part VI or Part XI], if the Council of States has declared"},{"n":313,"t":"Until other provision is made in this behalf under this Constitution, all the laws in force immediately before the commencement of this Constitution and applicable to any public service or any post which continues to exist after the commencement of this Constitution, as an allIndia service or as service or post under the Union or a State shall continue in force so far as consistent with the provisions of this Constitution. Transitional provisions.","h":""},{"n":314,"t":"[Provision for protection of existing officers of certain services.] Rep. by the Constitution (Twenty-eighth Amendment) Act, 1972, s. 3 (w.e.f. 29-8-1972). CHAPTER II.— PUBLIC SERVICE COMMISSIONS","h":""},{"n":315,"t":"(1) Subject to the provisions of this article, there shall be a Public Service Commission for the Union and a Public Service Commission for each State. Public Service Commissions for the Union and for the States. (Part XIV.—Services under the Union and the States.— Arts. 315—316.) (2) Two or more States may agree that there shall be one Public Service Commission for that group of States, and if a resolution to that effect is passed by the House or, where there are two Houses, by each House of th","h":""},{"n":316,"t":"(1) The Chairman and other members of a Public Service Commission shall be appointed, in the case of the Union Commission or a Joint Commission, by the President, and in the case of a State Commission, by the Governor 1*** of the State: Provided that as nearly as may be one-half of the members of every Public Service Commission shall be persons who at the dates of their respective appointments have held office for at least ten years either under the Government of India or under the Government of","h":"Service Commission shall be appointed, in the case of the"},{"n":317,"t":"(1) Subject to the provisions of clause (3), the Chairman or any other member of a Public Service Commission shall only be removed from his office by Removal and suspension of a member of a Public Service Commission. Ins. by the Constitution (Fifteenth Amendment) Act, 1963, s. 11. Subs. by the Constitution (Forty-first Amendment) Act, 1976, s. 2, for “sixty years”. The words “or Rajpramukh” omitted by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. (Part XIV.—Services under the Un","h":"Chairman or any other member of a Public Service"},{"n":318,"t":"In the case of the Union Commission or a Joint Commission, the President and, in the case of a State Commission, the Governor 1*** of the State may by regulations— (a) determine the number of members of the Commission and their conditions of service; and Power to make regulations as to conditions of service of members and staff of the Commission. (b) make provision with respect to the number of members of the staff of the Commission and their conditions of service: Provided that the conditions o","h":"Commission, the President and, in the case of a State"},{"n":319,"t":"On ceasing to hold office— (a) the Chairman of the Union Public Service Commission shall be ineligible for further employment either under the Government of India or under the Government of a State; Prohibition as to the holding of offices by members of Commission on ceasing to be such members. (b) the Chairman of a State Public Service Commission shall be eligible for appointment as the Chairman or any other member of the Union Public Service Commission or as the Chairman of any other State Pub","h":""},{"n":320,"t":"(1) It shall be the duty of the Union and the State Public Service Commissions to conduct examinations for appointments to the services of the Union and the services of the State respectively. (2) It shall also be the duty of the Union Public Service Commission, if requested by any two or more States so to do, to assist those States in framing and operating schemes of joint recruitment for any services for which candidates possessing special qualifications are required. (3) The Union Public Serv","h":"Public Service Commissions to conduct examinations for"},{"n":321,"t":"An Act made by Parliament or, as the case may be, the Legislature of a State may provide for the exercise of additional functions by the Union Public Service Commission or the State Public Service Commission as respects the services of the Union or the State and also as respects the services of any local authority or other body corporate constituted by law or of any public institution. Expenses of Public Service Commissions.","h":""},{"n":322,"t":"The expenses of the Union or a State Public Service Commission, including any salaries, allowances and pensions payable to or in respect of the members or staff of the Commission, shall be charged on the Consolidated Fund of India or, as the case may be, the Consolidated Fund of the State. Reports of Public Service Commissions.","h":"Service Commission, including any salaries, allowances"},{"n":323,"t":"(1) It shall be the duty of the Union Commission to present annually to the President a report as to the work done by the Commission and on receipt of such report the President shall cause a copy thereof together with a memorandum explaining, as respects the cases, if any, where the advice of the Commission was not accepted, the reasons for such non-acceptance to be laid before each House of Parliament. (2) It shall be the duty of a State Commission to present annually to the Governor 1*** of th","h":""}]},{"part":"PART XV","title":"ELECTIONS","sa":324,"ea":329,"articles":[{"n":324,"t":"(1) The superintendence, direction and control of the preparation of the electoral rolls for, and the conduct of, all elections to Parliament and to the Legislature of every State and of elections to the offices of President and Vice-President held under this Constitution 1*** shall be vested in a Commission (referred to in this Constitution as the Election Commission). Superintendence, direction and control of elections to be vested in an Election Commission. (2) The Election Commission shall c","h":""},{"n":325,"t":"There shall be one general electoral roll for every territorial constituency for election to either House of Parliament or to the House or either House of the Legislature of a State and no person shall be ineligible for inclusion in any such roll or claim to be included in any special electoral roll for any such constituency on grounds only of religion, race, caste, sex or any of them. Elections to the House of the People and to the Legislative Assemblies of States to be on the basis of adult su","h":""},{"n":326,"t":"The elections to the House of the People and to the Legislative Assembly of every State shall be on the basis of adult suffrage; that is to say, every person who is a citizen of India and who is not less than 2[eighteen years] of age on such date as may be fixed in that behalf by or under any law made by the appropriate Legislature and is not otherwise disqualified under this Constitution or any law made by the appropriate Legislature on the ground of non-residence, unsoundness of mind, crime or","h":""},{"n":327,"t":"Subject to the provisions of this Constitution, Parliament may from time to time by law make provision with respect to all matters relating to, or in connection with, elections to either House of Parliament or to the House or either House of the Legislature of a State including the preparation of electoral rolls, the delimitation of constituencies and all other matters necessary for securing the due constitution of such House or Houses. Power of Parliament to make provision with respect to elect","h":"Parliament may from time to time by law make provision"},{"n":328,"t":"Subject to the provisions of this Constitution and in so far as provision in that behalf is not made by Parliament, the Legislature of a State may from time to time by law make provision with respect to all matters relating to, or in connection with, the elections to the House or either House of the Legislature of the State including the preparation of electoral rolls and all other matters necessary for securing the due constitution of such House or Houses. Power of Legislature of a State to mak","h":""},{"n":329,"t":"1[Notwithstanding anything in this Constitution ***—] Bar to interference by courts in electoral matters. (a) the validity of any law relating to the delimitation of constituencies or the allotment of seats to such constituencies, made or purporting to be made under article 327 or article 328, shall not be called in question in any court; (b) no election to either House of Parliament or to the House or either House of the Legislature of a State shall be called in question except by an election p","h":""}]},{"part":"PART XVI","title":"SPECIAL PROVISIONS RELATING TO CERTAIN CLASSES","sa":330,"ea":342,"articles":[{"n":330,"t":"(1) Seats shall be reserved in the House of the People for — (a) the Scheduled Castes; [(b) the Scheduled Tribes except the Scheduled Tribes in the autonomous districts of Assam; and] (c) the Scheduled Tribes in the autonomous districts of Assam. (2) The number of seats reserved in any State 2[or Union territory] for the Scheduled Castes or the Scheduled Tribes under clause (1) shall bear, as nearly as may be, the same proportion to the total number of seats allotted to that State 2[or Union ter","h":"People for —"},{"n":331,"t":"Notwithstanding anything in article 81, the President may, if he is of opinion that the Anglo-Indian community is not adequately represented in the House of the People, nominate not more than two members of that community to the House of the People. Representation of the Anglo-Indian Community in the House of the People.","h":"President may, if he is of opinion that the Anglo-Indian"},{"n":332,"t":"(1) Seats shall be reserved for the Scheduled Castes and the Scheduled Tribes, 3[except the Scheduled Tribes in the autonomous districts of Assam], in the Legislative Assembly of every State 4***. Reservation of seats for Scheduled Castes and Scheduled Tribes in the Legislative Assemblies of the States. (2) Seats shall be reserved also for the autonomous districts in the Legislative Assembly of the State of Assam. (3) The number of seats reserved for the Scheduled Castes or the Scheduled Tribes ","h":"Castes and the Scheduled Tribes, 3[except the Scheduled"},{"n":333,"t":"Notwithstanding anything in article 170, the Governor 3*** of a State may, if he is of opinion that the Anglo-Indian community needs representation in the Legislative Assembly of the State and is not adequately represented therein, 4[nominate one member of that community to the Assembly].","h":"Governor 3*** of a State may, if he is of opinion that the"},{"n":334,"t":"Notwithstanding anything in the foregoing provisions of this Part, the provisions of this Constitution relating to— (a) the reservation of seats for the Scheduled Castes and the Scheduled Tribes in the House of the People and in the Legislative Assemblies of the States; and (b) the representation of the Anglo-Indian community in the House of the People and in the Legislative Assemblies of the States by nomination, Representation of the Anglo-Indian community in the Legislative Assemblies of the ","h":""},{"n":335,"t":"The claims of the members of the Scheduled Castes and the Scheduled Tribes shall be taken into consideration, consistently with the maintenance of efficiency of administration, in the making of appointments to services and posts in connection with the affairs of the Union or of a State: [Provided that nothing in this article shall prevent in making of any provision in favour of the members of the Scheduled Castes and the Scheduled Tribes for relaxation in qualifying marks in any examination or l","h":"Castes and the Scheduled Tribes shall be taken into"},{"n":336,"t":"(1) During the first two years after the commencement of this Constitution, appointments of members of the Anglo-Indian community to posts in the railway, customs, postal and telegraph services of the Union shall be made on the same basis as immediately before the fifteenth day of August, 1947. During every succeeding period of two years, the number of posts reserved for the members of the said community in the said services shall, as nearly as possible, be less by ten per cent. than the numbers","h":""},{"n":337,"t":"During the first three financial years after the commencement of this Constitution, the same grants, if any, shall be made by the Union and by each State 2*** for the benefit of the Anglo-Indian community in respect of education as were made in the financial year ending on the thirty-first day of March, 1948. Ins. by the Constitution (Eighty-second Amendment) Act, 2000, s. 2. The words and letters “specified in Part A or Part B of the First Schedule” omitted by the Constitution (Seventh Amendmen","h":""},{"n":338,"t":"2[(1) There shall be a Commission for the Scheduled Castes to be known as the National Commission for the Scheduled Castes. [National Commission for Scheduled Castes.] (2) Subject to the provisions of any law made in this behalf by Parliament, the Commission shall consist of a Chairperson, Vice-Chairperson and three other Members and the conditions of service and tenure of office of the Chairperson, Vice-Chairperson and other Members so appointed shall be such as the President may by rule determ","h":"Scheduled Castes to be known as the National"},{"n":339,"t":"(1) The President may at any time and shall, at the expiration of ten years from the commencement of this Constitution by order appoint a Commission to report on the administration of the Scheduled Areas and the welfare of the Scheduled Tribes in the States 1***. Control of the Union over the administration of Scheduled Areas and the welfare of Scheduled Tribes. The words and letters “specified in Part A and Part B of the First Schedule” omitted by the Constitution (Seventh Amendment) Act, 1956,","h":""},{"n":340,"t":"(1) The President may by order appoint a Commission consisting of such persons as he thinks fit to investigate the conditions of socially and educationally backward classes within the territory of India and the difficulties under which they labour and to make recommendations as to the steps that should be taken by the Union or any State to remove such difficulties and to improve their condition and as to the grants that should be made for the purpose by the Union or any State and the conditions ","h":"Commission consisting of such persons as he thinks fit"},{"n":341,"t":"(1) The President 2[may with respect to any State [or Union territory], and where it is a State 4***, after consultation with the Governor 5*** thereof,] by Subs by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch., for “any such State”. Subs. by the Constitution (First Amendment) Act, 1951, s. 10, for “may, after consultation with the Governor or Rajpramukh of a State”. Ins. by the Constitution (Seventh Amendment) Act, 1956, s. 29 and Sch. The words and letters “specified in Part A","h":""},{"n":342,"t":"(1) The President 3[may with respect to any State [or Union territory], and where it is a State 4***, after consultation with the Governor 5*** thereof,] by public notification6, specify the tribes or tribal communities or parts of or groups within tribes or tribal communities which shall for the purposes of this Constitution be deemed to be Scheduled Tribes in relation to that State [or Union territory, as the case may be]. Scheduled Tribes. (2) Parliament may by law include in or exclude from ","h":""}]},{"part":"PART XVII","title":"OFFICIAL LANGUAGE","sa":343,"ea":351,"articles":[{"n":343,"t":"(1) The official language of the Union shall be Hindi in Devanagari script. The form of numerals to be used for the official purposes of the Union shall be the internationa // BUILD SIDEBAR
function buildSidebar() {
  const nav = document.getElementById('sidebarNav');
  CONSTITUTION_DATA.forEach((part, idx) => {
    if (!part.articles || part.articles.length === 0) return;
    const item = document.createElement('div');
    item.className = 'part-nav-item';
    item.setAttribute('data-part-idx', idx);
    item.innerHTML = `
      <span class="part-nav-label">${part.part}</span>
      <span class="part-nav-title">${part.title}</span>
      <span class="part-nav-count">${part.articles.length} articles · Art. ${part.sa}–${part.ea}</span>
    `;
    item.addEventListener('click', () => {
      document.querySelectorAll('.part-nav-item').forEach(el => el.classList.remove('active'));
      item.classList.add('active');
      const section = document.getElementById('part-' + idx);
      if (section) section.scrollIntoView({ behavior: 'smooth', block: 'start' });
    });
    nav.appendChild(item);
  });
}

// HIGHLIGHT TEXT
function highlight(text, query) {
  if (!query) return text;
  const escaped = query.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  return text.replace(new RegExp(escaped, 'gi'), m => `<mark class="mark">${m}</mark>`);
}

// BUILD ARTICLE CARD
function buildArticleCard(article, searchQuery) {
  const heading = getArticleHeading(article);
  const judgements = getJudgements(article.n);
  const text = article.t || '';
  const isMatch = !searchQuery || 
    heading.toLowerCase().includes(searchQuery.toLowerCase()) ||
    text.toLowerCase().includes(searchQuery.toLowerCase()) ||
    String(article.n).includes(searchQuery);

  if (!isMatch) return null;

  const div = document.createElement('div');
  div.className = 'article-card';

  const hQuery = searchQuery;
  const headingHl = highlight(heading, hQuery);
  const textHl = highlight(text, hQuery);

  div.innerHTML = `
    <div class="article-number">ARTICLE ${article.n}</div>
    <div class="article-heading">${headingHl}</div>
    <div class="article-text">${textHl}</div>
    <button class="article-expand-btn" onclick="openModal(${article.n})">
      ${judgements.length > 0 ? '⚖ ' + judgements.length + ' Judgement(s) · ' : ''}Read Full Article ›
    </button>
  `;

  return div;
}

// OPEN MODAL
function openModal(artNum) {
  let article = null;
  let partName = '';
  for (const part of CONSTITUTION_DATA) {
    for (const a of part.articles) {
      if (a.n === artNum) { article = a; partName = part.part + ' — ' + part.title; break; }
    }
    if (article) break;
  }
  if (!article) return;

  const heading = getArticleHeading(article);
  const judgements = getJudgements(artNum);

  document.getElementById('modalTitle').textContent = `Article ${artNum}: ${heading}`;
  document.getElementById('modalSubtitle').textContent = partName;
  document.getElementById('modalText').textContent = article.t || 'Full text not available in this preview.';

  const judEl = document.getElementById('modalJudgements');
  if (judgements.length > 0) {
    judEl.innerHTML = `<h4>⚖ Landmark Judgements on Article ${artNum}</h4>` + 
      judgements.map(j => `
        <div class="judgement-card">
          <div class="judgement-case">${j.case}</div>
          <div class="judgement-citation">${j.citation}</div>
          <div class="judgement-holding">${j.holding}</div>
        </div>
      `).join('');
  } else {
    judEl.innerHTML = `<div style="font-size:0.85rem;color:var(--text-muted);padding:12px 0;">No landmark judgements indexed for this article in this database.</div>`;
  }

  document.getElementById('modalOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('modalOverlay').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// BUILD SECTIONS
function buildSections(globalQuery) {
  const container = document.getElementById('sectionsContainer');
  container.innerHTML = '';
  let totalVisible = 0;

  CONSTITUTION_DATA.forEach((part, idx) => {
    if (!part.articles || part.articles.length === 0) return;

    const partQuery = globalQuery || partSearches[idx] || '';
    
    const section = document.createElement('div');
    section.className = 'part-section';
    section.id = 'part-' + idx;

    const artRange = part.sa && part.ea ? `Articles ${part.sa} – ${part.ea}` : '';

    section.innerHTML = `
      <div class="part-header">
        <div class="part-emblem">PART<span>${part.part.replace('PART ','')}</span></div>
        <div class="part-header-text">
          <h2>${part.title}</h2>
          <div class="art-range">${artRange} · ${part.articles.length} articles</div>
        </div>
      </div>
      <div class="part-search-wrap">
        <span class="part-search-icon">&#128269;</span>
        <input type="text" class="part-search" placeholder="Search within ${part.part}..." 
          data-part-idx="${idx}" value="${partSearches[idx] || ''}"
          ${globalQuery ? 'disabled style="opacity:0.4"' : ''}>
      </div>
      <div class="articles-grid" id="grid-${idx}"></div>
    `;

    const grid = section.querySelector('#grid-' + idx);
    let count = 0;

    part.articles.forEach(article => {
      const card = buildArticleCard(article, partQuery);
      if (card) { grid.appendChild(card); count++; }
    });

    if (count === 0) {
      grid.innerHTML = '<div class="no-results">No articles match your search.</div>';
    }

    totalVisible += count;

    // Part search listener
    const partSearchInput = section.querySelector('.part-search');
    if (partSearchInput) {
      partSearchInput.addEventListener('input', function() {
        partSearches[idx] = this.value;
        rebuildGrid(part, idx, this.value);
      });
    }

    if (!globalQuery || count > 0) {
      container.appendChild(section);
    }
  });

  document.getElementById('searchStats').textContent = 
    globalQuery ? `${totalVisible} results for "${globalQuery}"` : `360 articles · 23 parts`;
}

function rebuildGrid(part, idx, query) {
  const grid = document.getElementById('grid-' + idx);
  if (!grid) return;
  grid.innerHTML = '';
  let count = 0;
  part.articles.forEach(article => {
    const card = buildArticleCard(article, query);
    if (card) { grid.appendChild(card); count++; }
  });
  if (count === 0) grid.innerHTML = '<div class="no-results">No articles match.</div>';
}

// GLOBAL SEARCH
let searchTimeout;
document.getElementById('globalSearch').addEventListener('input', function() {
  clearTimeout(searchTimeout);
  const q = this.value.trim();
  searchTimeout = setTimeout(() => {
    currentSearch = q;
    buildSections(q);
  }, 250);
});

// SCROLL BEHAVIOUR
window.addEventListener('scroll', () => {
  const btn = document.getElementById('jumpBtn');
  btn.classList.toggle('visible', window.scrollY > 400);

  // Highlight active part in sidebar
  const sections = document.querySelectorAll('.part-section');
  let active = null;
  sections.forEach(section => {
    const rect = section.getBoundingClientRect();
    if (rect.top <= 150) active = section;
  });
  if (active) {
    const idx = active.id.replace('part-', '');
    document.querySelectorAll('.part-nav-item').forEach(el => el.classList.remove('active'));
    const navItem = document.querySelector(`[data-part-idx="${idx}"]`);
    if (navItem) navItem.classList.add('active');
  }
});

// INIT
buildSidebar();
buildSections('');
</script>
</body>
</html>
